name: Extract ZIP Contents

on:
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'Name of the ZIP file to extract'
        required: true
        default: 'storysitting_app_mvp_foundation_v0_1 2.zip'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check if ZIP file exists
        run: |
          if [ ! -f "${{ github.event.inputs.zip_file }}" ]; then
            echo "ERROR: ZIP file '${{ github.event.inputs.zip_file }}' not found!"
            ls -la
            exit 1
          fi
          echo "Found ZIP file: ${{ github.event.inputs.zip_file }}"
      
      - name: Extract ZIP file
        run: |
          mkdir -p extracted
          unzip -o "${{ github.event.inputs.zip_file }}" -d ./extracted/
          echo "Extraction complete. Contents:"
          ls -R extracted/
      
      - name: Move extracted files to root
        run: |
          if [ -d "extracted" ] && [ "$(ls -A extracted)" ]; then
            cp -r extracted/* ./
            rm -rf extracted/
            echo "Files moved to repository root"
          else
            echo "No files to move"
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract ZIP contents: ${{ github.event.inputs.zip_file }}"
            git push
            echo "Changes pushed successfully"
          fi
